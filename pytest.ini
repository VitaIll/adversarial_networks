[pytest]
testpaths = tests
markers =
    slow: end-to-end recovery test at scale (deselected by default; run with `-m slow`)
addopts =
    -v
    --tb=short
    -m "not slow"
    --html=tests/reports/report.html
    --self-contained-html
filterwarnings =
    ignore:`torch_geometric\.distributed` has been deprecated since 2\.7\.0.*:DeprecationWarning
    ignore:`torch\.jit\.script` is deprecated\..*:DeprecationWarning
pythonpath = .
