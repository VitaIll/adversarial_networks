[pytest]
testpaths = tests
addopts =
    -v
    --tb=short
    --html=tests/reports/report.html
    --self-contained-html
filterwarnings =
    ignore:`torch_geometric\.distributed` has been deprecated since 2\.7\.0.*:DeprecationWarning
    ignore:`torch\.jit\.script` is deprecated\..*:DeprecationWarning
pythonpath = .
